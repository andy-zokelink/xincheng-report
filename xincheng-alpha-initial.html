<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新程 Alpha 认知模型初探 · AI 调研中心</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root {
    --bg: #08090a;
    --panel: #0f1011;
    --surface: #191a1b;
    --surface2: #222326;
    --text: #f7f8f8;
    --text2: #d0d6e0;
    --text3: #8a8f98;
    --text4: #62666d;
    --accent: #5e6ad2;
    --accent-bright: #7170ff;
    --green: #27a644;
    --orange: #d2991d;
    --red: #f85149;
    --border: rgba(255,255,255,0.08);
    --border-subtle: rgba(255,255,255,0.05);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg);
    color: var(--text2);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-feature-settings: 'cv01','ss03';
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Particle canvas */
  #particles {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; opacity: 0.65;
  }
  /* Ambient glow orb */
  #glow {
    position: fixed; z-index: 0; pointer-events: none;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(113,112,255,0.07) 0%, transparent 70%);
    transform: translate(-50%, -50%);
    transition: left 0.8s ease-out, top 0.8s ease-out;
  }

  /* Reveal on scroll */
  .reveal {
    opacity: 0; transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* Ensure content above particles */
  nav, .hero, .kpi-row, .sec, footer { position: relative; z-index: 1; }

  /* Nav */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,16,17,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-subtle);
    padding: 0 24px;
  }
  nav .inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; gap: 24px;
    height: 52px;
  }
  nav .logo {
    font-size: 15px; font-weight: 600; color: var(--text);
    letter-spacing: -0.2px; white-space: nowrap;
  }
  nav .logo span { color: var(--accent-bright); }
  nav a {
    font-size: 13px; font-weight: 500; color: var(--text3);
    text-decoration: none; transition: color .15s;
    white-space: nowrap;
  }
  nav a:hover { color: var(--text); }

  /* Hero */
  .hero {
    max-width: 1200px; margin: 0 auto;
    padding: 80px 24px 64px;
    text-align: center;
  }
  .hero .badge {
    display: inline-block;
    background: rgba(94,106,210,0.12);
    color: var(--accent-bright);
    border: 1px solid rgba(94,106,210,0.25);
    border-radius: 999px; padding: 4px 16px;
    font-size: 12px; font-weight: 500;
    margin-bottom: 24px;
  }
  .hero h1 {
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 600; letter-spacing: -0.04em;
    color: var(--text); line-height: 1.15;
    margin-bottom: 16px;
  }
  .hero h1 span { color: var(--accent-bright); }
  .hero p {
    font-size: 1.1rem; color: var(--text3);
    max-width: 640px; margin: 0 auto;
    font-weight: 400;
  }

  /* KPI row */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
    gap: 16px;
    max-width: 1200px; margin: 0 auto 80px;
    padding: 0 24px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; text-align: center;
  }
  .kpi .val {
    font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em;
    color: var(--text); margin-bottom: 4px;
  }
  .kpi .val.accent { color: var(--accent-bright); }
  .kpi .val.green { color: var(--green); }
  .kpi .lbl { font-size: 13px; color: var(--text3); }

  /* Section container */
  .sec {
    max-width: 1200px; margin: 0 auto 72px;
    padding: 0 24px;
  }
  .sec h2 {
    font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em;
    color: var(--text); margin-bottom: 8px;
  }
  .sec .sub {
    font-size: 14px; color: var(--text3); margin-bottom: 32px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 28px;
    margin-bottom: 16px;
  }
  .card h3 {
    font-size: 16px; font-weight: 600; color: var(--text);
    margin-bottom: 12px; letter-spacing: -0.01em;
  }
  .card p, .card li { font-size: 14px; color: var(--text2); }
  .card li { padding: 4px 0; }
  ul { list-style: none; padding: 0; }
  li::before { content: "·"; color: var(--accent-bright); font-weight: 700; margin-right: 8px; }

  /* Charts */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 28px;
    margin-bottom: 16px;
  }
  .chart-wrap canvas { max-height: 380px; }

  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }

  /* Table styled */
  .tbl {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .tbl th {
    text-align: left; padding: 10px 14px;
    color: var(--text3); font-weight: 500; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
  }
  .tbl td {
    padding: 10px 14px; color: var(--text2);
    border-bottom: 1px solid var(--border-subtle);
  }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .hi { color: var(--accent-bright); font-weight: 600; }
  .tbl .lo { color: var(--text4); }
  .tbl .cl { color: var(--red); }

  /* Accordion */
  .acc { margin-bottom: 16px; }
  .acc-hdr {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 24px;
    cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; font-size: 15px; font-weight: 600;
    color: var(--text); transition: border-color .15s;
  }
  .acc-hdr:hover { border-color: rgba(255,255,255,0.15); }
  .acc-hdr::after { content: "+"; font-size: 18px; color: var(--text3); font-weight: 400; transition: transform .2s; }
  .acc.open .acc-hdr::after { content: "−"; }
  .acc-body {
    display: none; background: var(--surface);
    border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 10px 10px; padding: 24px;
    font-size: 14px; color: var(--text2);
  }
  .acc.open .acc-body { display: block; }

  /* Insight box */
  .insight {
    background: rgba(94,106,210,0.06);
    border: 1px solid rgba(94,106,210,0.18);
    border-radius: 10px; padding: 24px 28px;
    font-size: 14px;
  }
  .insight strong { color: var(--accent-bright); }

  /* Tags */
  .tag {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 500; margin-right: 6px;
  }
  .tag.g { background: rgba(39,166,68,0.12); color: var(--green); border: 1px solid rgba(39,166,68,0.2); }
  .tag.p { background: rgba(94,106,210,0.12); color: var(--accent-bright); border: 1px solid rgba(94,106,210,0.2); }
  .tag.o { background: rgba(210,153,29,0.12); color: var(--orange); border: 1px solid rgba(210,153,29,0.2); }
  .tag.r { background: rgba(248,81,73,0.1); color: var(--red); border: 1px solid rgba(248,81,73,0.18); }

  /* Section nav pills */
  .pills {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px;
  }
  .pill {
    padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); color: var(--text3);
    cursor: pointer; transition: all .15s; background: transparent;
  }
  .pill:hover, .pill.active {
    background: rgba(94,106,210,0.1); color: var(--accent-bright);
    border-color: rgba(94,106,210,0.3);
  }

  /* Tooltip-style note */
  .note {
    font-size: 12px; color: var(--text4); margin-top: 8px;
  }

  footer {
    text-align: center; padding: 48px 24px;
    color: var(--text4); font-size: 12px;
    border-top: 1px solid var(--border-subtle);
    margin-top: 80px;
  }
  footer a { color: var(--text3); }

  .report-body {
    max-width:860px; margin:0 auto; padding:24px 24px 80px;
  }
  .report-body h1 { font-size:2rem; font-weight:700; color:var(--text); letter-spacing:-0.03em; margin:32px 0 16px; line-height:1.2; }
  .report-body h2 { font-size:1.4rem; font-weight:600; color:var(--text); letter-spacing:-0.02em; margin:28px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border-subtle); }
  .back-link {
    display:inline-flex; align-items:center; gap:6px; color:var(--text3);
    text-decoration:none; font-size:13px; margin-bottom:24px; transition:color 0.2s;
  }
  .back-link:hover { color:var(--text); }
  .report-meta {
    display:flex; gap:12px; flex-wrap:wrap; margin:12px 0 28px;
  }
  .meta-tag {
    padding:3px 12px; border-radius:999px; font-size:11px; font-weight:500;
    background:var(--surface); color:var(--text3); border:1px solid var(--border);
  }
  .meta-tag.accent { color:var(--accent-bright); border-color:rgba(94,106,210,0.3); background:rgba(94,106,210,0.08); }
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="glow"></div>

<nav>
  <div class="inner">
    <a href="index.html" style="text-decoration:none;color:inherit"><div class="logo"><span>◈</span> AI 调研中心</div></a>
  </div>
</nav>

<div class="report-body">
  <a href="index.html" class="back-link">← 返回目录</a>
  <h1>🔬 新程 Alpha 认知模型初探</h1>
  <div class="report-meta">
    <span class="meta-tag accent">model-research</span>
    <span class="meta-tag">来源: 秘塔AI搜索</span>
    <span class="meta-tag">2026-06-11</span>
    
  </div>
  <p style='color:var(--text3)'>暂无正文内容</p>
</div>

<footer style="text-align:center;padding:40px 24px;color:var(--text4);font-size:12px;border-top:1px solid var(--border-subtle);position:relative;z-index:1">
  <p>AI 调研中心 · Powered by Hermes Agent + 秘塔 AI 搜索</p>
</footer>

<script>
// Particles
(function(){
  const c=document.getElementById('particles'),x=c.getContext('2d');
  let w,h,ps=[],mx=-100,my=-100;
  function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
  rs();addEventListener('resize',rs);
  for(let i=0;i<60;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+.8,o:Math.random()*.5+.15});
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
  (function d(){
    x.clearRect(0,0,w,h);
    for(let i=0;i<ps.length;i++){
      let p=ps[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<-50||p.x>w+50)p.vx*=-1;if(p.y<-50||p.y>h+50)p.vy*=-1;
      let dx=p.x-mx,dy=p.y-my,md=Math.sqrt(dx*dx+dy*dy);
      if(md<180){p.vx+=dx/md*.012;p.vy+=dy/md*.012}
      let sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(sp>.7){p.vx*=.98;p.vy*=.98}
      x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);
      x.fillStyle=`rgba(113,112,255,${Math.min(p.o+(md<180?.25:0),1)})`;x.fill();
      for(let j=i+1;j<ps.length;j++){
        let q=ps[j],x2=p.x-q.x,y2=p.y-q.y,dt=Math.sqrt(x2*x2+y2*y2);
        if(dt<140){x.beginPath();x.moveTo(p.x,p.y);x.lineTo(q.x,q.y);x.strokeStyle=`rgba(113,112,255,${.08*(1-dt/140)})`;x.lineWidth=.5;x.stroke()}
      }
    }
    requestAnimationFrame(d);
  })();
})();
// Glow
(function(){
  let g=document.getElementById('glow'),tx=0,ty=0,cx=0,cy=0;
  addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY});
  (function f(){cx+=(tx-cx)*.05;cy+=(ty-cy)*.05;g.style.left=cx+'px';g.style.top=cy+'px';requestAnimationFrame(f)})();
})();
// Scroll reveal
(function(){
  let o=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';o.unobserve(e.target)}}),{threshold:.1});
  document.querySelectorAll('.report-body h1,.report-body h2,.report-body h3,.report-body p,.report-body table,.report-body blockquote,.report-body pre').forEach(el=>{el.style.opacity='0';el.style.transform='translateY(16px)';el.style.transition='opacity .5s ease, transform .5s ease';o.observe(el)});
})();
</script>
</body>
</html>
