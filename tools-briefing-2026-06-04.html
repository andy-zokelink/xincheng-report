<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills 生态趋势**：Skills 模式从 Hermes 扩散到整个 GitHub，`mattpocock/skills` 单日 3000+⭐、HuggingFace Skills 标准化、Hermes 91 个技能覆盖 17 个分类 · AI 调研中心</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090a; --panel: #0f1011; --surface: #191a1b;
    --surface2: #222326; --text: #f7f8f8; --text2: #d0d6e0;
    --text3: #8a8f98; --text4: #62666d; --accent: #5e6ad2;
    --accent-bright: #7170ff; --green: #27a644;
    --orange: #d2991d; --red: #f85149;
    --border: rgba(255,255,255,0.08); --border-subtle: rgba(255,255,255,0.05);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg); color: var(--text2);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.6; overflow-x: hidden;
  }
  #particles {
    position: fixed; top:0; left:0; width:100%; height:100%;
    z-index:0; pointer-events:none; opacity:0.5;
  }
  #glow {
    position: fixed; z-index:0; pointer-events:none;
    width:600px; height:600px; border-radius:50%;
    background: radial-gradient(circle, rgba(113,112,255,0.06) 0%, transparent 70%);
    transform: translate(-50%,-50%); transition: left 0.8s ease-out, top 0.8s ease-out;
  }
  nav, .report-body, footer { position:relative; z-index:1; }

  nav {
    position:sticky; top:0; z-index:100;
    background: rgba(15,16,17,0.94); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border-subtle); padding:0 24px;
  }
  nav .inner {
    max-width:1100px; margin:0 auto; display:flex;
    align-items:center; justify-content:space-between; height:52px;
  }
  nav .logo { font-size:15px; font-weight:600; color:var(--text); }
  nav .logo span { color:var(--accent-bright); }
  nav a { font-size:13px; font-weight:500; color:var(--text3); text-decoration:none; }
  nav a:hover { color:var(--text); }

  .report-body { max-width:900px; margin:0 auto; padding:32px 24px 80px; }

  .back-link {
    display:inline-flex; align-items:center; gap:6px;
    color:var(--text3); text-decoration:none; font-size:13px;
    margin-bottom:32px; transition:color 0.2s;
  }
  .back-link:hover { color:var(--text); }

  /* Hero */
  .report-hero { text-align:center; padding:32px 0 24px; border-bottom:1px solid var(--border-subtle); margin-bottom:32px; }
  .report-hero .badge {
    display:inline-block; background:rgba(94,106,210,0.12); color:var(--accent-bright);
    border:1px solid rgba(94,106,210,0.25); border-radius:999px; padding:4px 16px;
    font-size:12px; font-weight:500; margin-bottom:16px;
  }
  .report-hero h1 {
    font-size:clamp(1.6rem,3.5vw,2.4rem); font-weight:700;
    letter-spacing:-0.03em; color:var(--text); line-height:1.25; margin-bottom:12px;
  }
  .report-meta { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .meta-tag {
    padding:3px 12px; border-radius:999px; font-size:11px; font-weight:500;
    background:var(--surface); color:var(--text3); border:1px solid var(--border);
  }
  .meta-tag.accent { color:var(--accent-bright); border-color:rgba(94,106,210,0.3); background:rgba(94,106,210,0.08); }

  /* KPI row */
  .kpi-row {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:12px; margin:28px 0;
  }
  .kpi {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:18px; text-align:center;
  }
  .kpi .val { font-size:1.6rem; font-weight:700; color:var(--accent-bright); letter-spacing:-0.02em; }
  .kpi .lbl { font-size:11px; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:0.03em; }

  /* Pills nav */
  .pills {
    display:flex; gap:6px; flex-wrap:wrap; margin:0 0 32px;
    padding:12px 0; border-bottom:1px solid var(--border-subtle);
  }
  .pill {
    padding:5px 14px; border-radius:999px; font-size:12px; font-weight:500;
    border:1px solid var(--border); color:var(--text3);
    cursor:pointer; transition:all .15s; background:transparent;
  }
  .pill:hover { background:rgba(94,106,210,0.1); color:var(--accent-bright); border-color:rgba(94,106,210,0.3); }

  /* Content */
  h1.section-title {
    font-size:1.8rem; font-weight:700; color:var(--text);
    letter-spacing:-0.02em; margin:36px 0 16px; line-height:1.25;
  }
  h2.section-title {
    font-size:1.3rem; font-weight:600; color:var(--text);
    letter-spacing:-0.02em; margin:32px 0 12px; padding-bottom:8px;
    border-bottom:1px solid var(--border-subtle);
  }
  h3 { font-size:1.1rem; font-weight:600; color:var(--text); margin:24px 0 8px; }
  h4 { font-size:0.95rem; font-weight:600; color:var(--text2); margin:18px 0 6px; }
  p { color:var(--text2); line-height:1.75; margin:8px 0; }
  strong { color:var(--text); }
  code {
    background:var(--panel); padding:2px 6px; border-radius:4px;
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent-bright);
  }
  a { color:var(--accent-bright); text-decoration:none; }
  a:hover { text-decoration:underline; }

  /* Table */
  .tbl {
    width:100%; border-collapse:collapse; font-size:13px; margin:16px 0;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    overflow:hidden;
  }
  .tbl th {
    text-align:left; padding:10px 14px; color:var(--text3);
    font-weight:500; font-size:11px; text-transform:uppercase;
    letter-spacing:0.04em; background:var(--panel);
    border-bottom:1px solid var(--border);
  }
  .tbl td {
    padding:9px 14px; color:var(--text2); border-bottom:1px solid var(--border-subtle);
  }
  .tbl tr:last-child td { border-bottom:none; }

  /* Blockquote */
  blockquote {
    border-left:3px solid var(--accent); padding:12px 20px; margin:16px 0;
    color:var(--text3); background:rgba(94,106,210,0.05);
    border-radius:0 8px 8px 0; font-size:14px;
  }

  /* Insight box */
  .insight-box {
    background:rgba(94,106,210,0.06); border:1px solid rgba(94,106,210,0.2);
    border-radius:12px; padding:24px 28px; margin:24px 0;
  }
  .insight-box .insight-label {
    font-size:11px; font-weight:600; color:var(--accent-bright);
    text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px;
  }
  .insight-box p { color:var(--text); font-size:15px; font-weight:500; }

  /* Code block */
  .code-block {
    background:var(--panel); border:1px solid var(--border);
    border-radius:8px; padding:16px; overflow-x:auto;
    font-family:'JetBrains Mono',monospace; font-size:12px;
    line-height:1.7; color:var(--text2); margin:12px 0;
  }

  ul { list-style:none; padding:0; margin:8px 0; }
  li { padding:4px 0 4px 16px; color:var(--text2); font-size:14px; position:relative; }
  li::before { content:"·"; color:var(--accent-bright); font-weight:700; position:absolute; left:0; }

  hr { border:none; border-top:1px solid var(--border-subtle); margin:32px 0; }

  .check { color:var(--green); }
  .cross { color:var(--red); }
  .warn { color:var(--orange); }

  footer {
    text-align:center; padding:40px 24px; color:var(--text4); font-size:12px;
    border-top:1px solid var(--border-subtle);
  }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:999px; }

  @media(max-width:640px) {
    .report-hero h1 { font-size:1.4rem; }
    .kpi-row { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="glow"></div>

<nav>

  </div>

<div class="report-body">
  <a href="index.html" class="back-link">← 返回目录</a>
  
  <div class="report-hero">
    <div class="badge">📰 ecosystem-research</div>
    <h1>Skills 生态趋势**：Skills 模式从 Hermes 扩散到整个 GitHub，`mattpocock/skills` 单日 3000+⭐、HuggingFace Skills 标准化、Hermes 91 个技能覆盖 17 个分类</h1>
    <div class="report-meta">
      <span class="meta-tag accent">ecosystem-research</span>
      <span class="meta-tag">来源: GitHub Trending + 秘塔搜索</span>
      <span class="meta-tag">2026-06-04</span>
      
    </div>
  </div>

  
  
  
  
  <p>暂无正文内容</p>
</div>

<footer>
  <p>AI 调研中心 · Powered by Hermes Agent + 秘塔 AI 搜索 + 飞书 Drive</p>
</footer>

<script>
// Particles
(function(){
  const c=document.getElementById('particles'),x=c.getContext('2d');
  let w,h,ps=[],mx=-100,my=-100;
  function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
  rs();addEventListener('resize',rs);
  for(let i=0;i<60;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+.6,o:Math.random()*.5+.12});
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
  (function d(){
    x.clearRect(0,0,w,h);
    for(let i=0;i<ps.length;i++){
      let p=ps[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<-50||p.x>w+50)p.vx*=-1;if(p.y<-50||p.y>h+50)p.vy*=-1;
      let dx=p.x-mx,dy=p.y-my,md=Math.sqrt(dx*dx+dy*dy);
      if(md<180){p.vx+=dx/md*.01;p.vy+=dy/md*.01}
      let sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(sp>.7){p.vx*=.98;p.vy*=.98}
      x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);
      x.fillStyle=`rgba(113,112,255,${Math.min(p.o+(md<180?.2:0),1)})`;x.fill();
      for(let j=i+1;j<ps.length;j++){
        let q=ps[j],x2=p.x-q.x,y2=p.y-q.y,dt=Math.sqrt(x2*x2+y2*y2);
        if(dt<130){x.beginPath();x.moveTo(p.x,p.y);x.lineTo(q.x,q.y);x.strokeStyle=`rgba(113,112,255,${.07*(1-dt/130)})`;x.lineWidth=.5;x.stroke()}
      }
    }
    requestAnimationFrame(d);
  })();
})();
// Glow
(function(){
  let g=document.getElementById('glow'),tx=0,ty=0,cx=0,cy=0;
  addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY});
  (function f(){cx+=(tx-cx)*.05;cy+=(ty-cy)*.05;g.style.left=cx+'px';g.style.top=cy+'px';requestAnimationFrame(f)})();
})();
// Scroll reveal
(function(){
  let o=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';o.unobserve(e.target)}}),{threshold:.08});
  document.querySelectorAll('.kpi,.tbl,blockquote,.insight-box,h2.section-title').forEach(el=>{el.style.opacity='0';el.style.transform='translateY(16px)';el.style.transition='opacity .5s ease, transform .5s ease';o.observe(el)});
})();
</script>
