<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #08090a; --panel: #0f1011; --surface: #191a1b;
    --surface2: #222326; --text: #f7f8f8; --text2: #d0d6e0;
    --text3: #8a8f98; --text4: #62666d; --accent: #5e6ad2;
    --accent-bright: #7170ff; --green: #27a644;
    --orange: #d2991d; --red: #f85149;
    --border: rgba(255,255,255,0.08); --border-subtle: rgba(255,255,255,0.05);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg); color: var(--text2);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-feature-settings: 'cv01','ss03'; line-height: 1.6; overflow-x: hidden;
  }
  #particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; opacity:0.6; }
  #glow { position:fixed; z-index:0; pointer-events:none; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle, rgba(113,112,255,0.07) 0%, transparent 70%); transform:translate(-50%,-50%); transition:left 0.8s ease-out, top 0.8s ease-out; }
  .reveal { opacity:0; transform:translateY(24px); transition:opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }
  nav, .hero, .kpi-row, .sec, footer { position:relative; z-index:1; }

  nav { position:sticky; top:0; z-index:100; background:rgba(15,16,17,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border-subtle); padding:0 24px; }
  nav .inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:52px; }
  nav .logo { font-size:15px; font-weight:600; color:var(--text); letter-spacing:-0.2px; }
  nav .logo span { color:var(--accent-bright); }
  nav a { font-size:13px; font-weight:500; color:var(--text3); text-decoration:none; transition:color .15s; white-space:nowrap; }
  nav a:hover { color:var(--text); }

  .hero { max-width:1100px; margin:0 auto; padding:72px 24px 48px; text-align:center; }
  .hero .badge { display:inline-block; background:rgba(94,106,210,0.12); color:var(--accent-bright); border:1px solid rgba(94,106,210,0.25); border-radius:999px; padding:4px 16px; font-size:12px; font-weight:500; margin-bottom:20px; }
  .hero h1 { font-size:clamp(1.8rem,4vw,3rem); font-weight:600; letter-spacing:-0.04em; color:var(--text); line-height:1.15; margin-bottom:12px; }
  .hero h1 span { color:var(--accent-bright); }
  .hero p { font-size:1rem; color:var(--text3); max-width:600px; margin:0 auto; font-weight:400; }

  .kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; max-width:1100px; margin:0 auto 64px; padding:0 24px; }
  .kpi { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; text-align:center; }
  .kpi .val { font-size:2rem; font-weight:700; letter-spacing:-0.03em; color:var(--text); margin-bottom:4px; }
  .kpi .val.accent { color:var(--accent-bright); }
  .kpi .val.green { color:var(--green); }
  .kpi .lbl { font-size:12px; color:var(--text3); }

  .sec { max-width:1100px; margin:0 auto 64px; padding:0 24px; }
  .sec h2 { font-size:1.4rem; font-weight:600; letter-spacing:-0.02em; color:var(--text); margin-bottom:8px; }
  .sec .sub { font-size:13px; color:var(--text3); margin-bottom:24px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px 28px; margin-bottom:14px; }
  .card h3 { font-size:15px; font-weight:600; color:var(--text); margin-bottom:10px; letter-spacing:-0.01em; }
  .card p, .card li { font-size:13px; color:var(--text2); }
  .card li { padding:3px 0; }

  ul { list-style:none; padding:0; }
  li { padding:3px 0 3px 16px; color:var(--text2); font-size:13px; position:relative; }
  li::before { content:"·"; color:var(--accent-bright); font-weight:700; position:absolute; left:0; }

  .tbl { width:100%; border-collapse:collapse; font-size:12px; }
  .tbl th { text-align:left; padding:8px 12px; color:var(--text3); font-weight:500; font-size:10px; text-transform:uppercase; letter-spacing:0.04em; border-bottom:1px solid var(--border); }
  .tbl td { padding:8px 12px; color:var(--text2); border-bottom:1px solid var(--border-subtle); }
  .tbl tr:last-child td { border-bottom:none; }
  .tbl .hi { color:var(--accent-bright); font-weight:600; }
  .tbl .gr { color:var(--green); font-weight:600; }
  .tbl .lo { color:var(--text4); }

  .acc { margin-bottom:14px; }
  .acc-hdr { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 22px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-size:14px; font-weight:600; color:var(--text); transition:border-color .15s; }
  .acc-hdr:hover { border-color:rgba(255,255,255,0.15); }
  .acc-hdr::after { content:"+"; font-size:16px; color:var(--text3); font-weight:400; }
  .acc.open .acc-hdr::after { content:"\2212"; }
  .acc-body { display:none; background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 10px 10px; padding:20px 24px; font-size:13px; color:var(--text2); }
  .acc.open .acc-body { display:block; }

  .insight { background:rgba(94,106,210,0.06); border:1px solid rgba(94,106,210,0.18); border-radius:10px; padding:20px 24px; font-size:13px; margin-bottom:14px; }
  .insight strong { color:var(--accent-bright); }

  .chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; margin-bottom:14px; }
  .chart-wrap canvas { max-height:350px; }
  .chart-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:768px){ .chart-row{grid-template-columns:1fr;} }

  .pills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:28px; }
  .pill { padding:5px 14px; border-radius:999px; font-size:11px; font-weight:500; border:1px solid var(--border); color:var(--text3); cursor:pointer; transition:all .15s; background:transparent; }
  .pill:hover { background:rgba(94,106,210,0.1); color:var(--accent-bright); border-color:rgba(94,106,210,0.3); }

  .tag { display:inline-block; padding:2px 8px; border-radius:999px; font-size:10px; font-weight:500; margin-right:4px; }
  .tag.g { background:rgba(39,166,68,0.12); color:var(--green); border:1px solid rgba(39,166,68,0.2); }
  .tag.p { background:rgba(94,106,210,0.12); color:var(--accent-bright); border:1px solid rgba(94,106,210,0.2); }
  .tag.o { background:rgba(210,153,29,0.12); color:var(--orange); border:1px solid rgba(210,153,29,0.2); }

  strong { color:var(--text); }
  code { background:var(--panel); padding:2px 6px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent-bright); }
  a { color:var(--accent-bright); text-decoration:none; }
  hr { border:none; border-top:1px solid var(--border-subtle); margin:28px 0; }
  blockquote { border-left:3px solid var(--accent); padding:8px 16px; margin:12px 0; color:var(--text3); background:rgba(94,106,210,0.05); border-radius:0 6px 6px 0; font-size:13px; }

  footer { text-align:center; padding:48px 24px; color:var(--text4); font-size:12px; border-top:1px solid var(--border-subtle); margin-top:80px; }
  footer a { color:var(--text3); }
  .note { font-size:11px; color:var(--text4); margin-top:6px; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:999px; }
</style>

<script>
// Particles
(function(){
  const c=document.getElementById('particles'),x=c.getContext('2d');
  let w,h,ps=[],mx=-100,my=-100;
  function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
  rs();addEventListener('resize',rs);
  for(let i=0;i<70;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,r:Math.random()*2+.6,o:Math.random()*.5+.12});
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
  (function d(){
    x.clearRect(0,0,w,h);
    for(let i=0;i<ps.length;i++){
      let p=ps[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<-50||p.x>w+50)p.vx*=-1;if(p.y<-50||p.y>h+50)p.vy*=-1;
      let dx=p.x-mx,dy=p.y-my,md=Math.sqrt(dx*dx+dy*dy);
      if(md<200){p.vx+=dx/md*.012;p.vy+=dy/md*.012}
      let sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(sp>.8){p.vx*=.98;p.vy*=.98}
      x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);
      x.fillStyle=`rgba(113,112,255,${Math.min(p.o+(md<200?.25:0),1)})`;x.fill();
      for(let j=i+1;j<ps.length;j++){
        let q=ps[j],x2=p.x-q.x,y2=p.y-q.y,dt=Math.sqrt(x2*x2+y2*y2);
        if(dt<150){x.beginPath();x.moveTo(p.x,p.y);x.lineTo(q.x,q.y);x.strokeStyle=`rgba(113,112,255,${.08*(1-dt/150)})`;x.lineWidth=.5;x.stroke()}
      }
    }
    requestAnimationFrame(d);
  })();
})();
// Glow
(function(){
  let g=document.getElementById('glow'),tx=0,ty=0,cx=0,cy=0;
  addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY});
  (function f(){cx+=(tx-cx)*.05;cy+=(ty-cy)*.05;g.style.left=cx+'px';g.style.top=cy+'px';requestAnimationFrame(f)})();
})();
// Scroll reveal
(function(){
  let o=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');o.unobserve(e.target)}}),{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>o.observe(el));
})();
// KPI CountUp
(function(){
  const animated=new Set();
  const obs=new IntersectionObserver(entries=>entries.forEach(e=>{
    if(e.isIntersecting&&!animated.has(e.target)){
      animated.add(e.target);
      const valEl=e.target.querySelector('.val');
      if(!valEl)return;
      const text=valEl.textContent.trim();
      const num=parseFloat(text);
      if(isNaN(num))return;
      const suffix=text.replace(/[0-9.]/g,'');
      const duration=1200,start=performance.now();
      function tick(now){
        const p=Math.min((now-start)/duration,1);
        const eased=1-Math.pow(1-p,3);
        const cur=num*eased;
        valEl.textContent=Number.isInteger(num)?Math.round(cur)+suffix:cur.toFixed(1)+suffix;
        if(p<1)requestAnimationFrame(tick);else valEl.textContent=text;
      }
      requestAnimationFrame(tick);
    }
  }),{threshold:.3});
  document.querySelectorAll('.kpi').forEach(el=>obs.observe(el));
})();
// Accordion
document.querySelectorAll('.acc-hdr').forEach(h=>h.addEventListener('click',()=>h.parentElement.classList.toggle('open')));
</script>
